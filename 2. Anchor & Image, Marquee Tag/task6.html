<!DOCTYPE html>
<html lang="en">

<head>
    <title>Image & Internal Links</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            display: inline-block;
            text-decoration: none;
        }

        li {
            list-style: none;
        }

        img {
            display: block;
            max-width: 100%;
        }

        header {
            display: flex;
            justify-content: space-evenly;
            background-color: #0A192F;
            padding: 10px 0;
        }

        header nav ul {
            display: flex;
        }

        header nav ul li a,
        header h2,
        header a {
            color: #FFFFFF;
        }

        img {
            height: 300px;
            /* width: 300px; */
        }

        .py {
            padding: 50px 0;
        }

        section h2 {
            margin: 0 0 20px 0;
        }
    </style>
</head>

<body>

    <header>
        <h2 style="font-size: 30px;">Image Gallery</h2>

        <nav style="display: flex; align-items: center;">
            <ul>
                <li style="margin: 0 10px; font-size: 18px;;"><a href="#illustrations">Illustrations</a></li>

                </li>
                <li style="margin: 0 10px; font-size: 18px;;"><a href="#photos">Photos</a></li>
