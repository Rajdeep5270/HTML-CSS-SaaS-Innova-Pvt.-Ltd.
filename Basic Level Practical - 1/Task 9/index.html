<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Dropdown Menu</title>

    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>

    <header>
        <!-- navbar section  -->
        <section class="navbar">
            <div class="container">
                <div class="navbar-content">
                    <h2>LOGO</h2>

                    <nav>
                        <ul>
                            <li>Home</li>
                            <li>About</li>
                            <li>Services</li>
                            <li>Contact</li>
                        </ul>
                    </nav>

                    <div class="dropdown" >
                        <button class="auth-btn">Hover Me !</button>
                        <div class="dropdown-menu">
                            <a href="">Service 1</a>
                            <a href="">Service 2</a>
                            <a href="">Service 3</a>
                            <a href="">Service 4</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </header>

</body>

</html>
