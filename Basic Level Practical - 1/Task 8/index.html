<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement a flexbox layout</title>


    <style>
        .parent {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap-reverse;
        }

        .parent .child {
            margin: 10px 20px;
            height: 200px;
            width: 200px;
            background-color: red;
        }
    </style>
</head>

<body>
    <main>
        <section class="flexbox-layout">
            <h2 style="text-align: center; font-size: 50px;">Flexbox Layout 1</h2>
            <div class="parent">
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
            </div>

            <h2 style="text-align: center; font-size: 50px;">Flexbox Layout 2</h2>
            <div class="parent">
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
            </div>

            <h2 style="text-align: center; font-size: 50px;">Flexbox Layout 3</h2>
            <div class="parent">
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
                <div class="child"></div>
            </div>

        </section>
    </main>
</body>

</html>
