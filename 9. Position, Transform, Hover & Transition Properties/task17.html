<!DOCTYPE html>
<html lang="en">

<head>
    <title>Hover Effects and Transitions</title>

    <style>
        button {
            padding: 10px 20px;
            border: none;
            border: 2px solid black;
            margin: 0 10px;
        }

        .btn1 {
            background-color: aqua;
            transition: all 0.3s ease-in-out;
        }

        .btn1:hover {
            background-color: cadetblue;
            color: white;
        }

        .btn2 {
            background-color: aquamarine;
            transition: all 0.3s ease;
        }

        .btn2:hover {
            background-color: green;
            transform: scale(1.5);
        }

        .btn3 {
            background-color: bisque;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
        }

        .btn3:hover {
            transform: scale(1.2);
            font-weight: bold;
        }

        .btn3:hover .hover-effect {
            top: 0;
        }

        .hover-effect {
            position: absolute;
            height: 100%;
            width: 100%;
            top: -100%;
            left: 0;
            background-color: chartreuse;
            transition: all 0.3s ease-in-out;
            z-index: -1;
        }

        .div1 {
            height: 100px;
            width: 100px;
            background-color: aquamarine;
            margin: 100px 0 0 0;
            transition: height 4s, width 6s, background-color 5s, border-radius 5s;
        }

        .div1:hover {
            height: 300px;
            width: 300px;
            background-color: orange;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <main>
        <section class="buttons">
            <center>
                <h2>Hovering on these buttons will give some animation effects</h2>
                <button class="btn1">Hover ME!</button>
                <button class="btn2">Hover ME!</button>
                <button class="btn3">Hover ME!
                    <div class="hover-effect"></div>
                </button>
            </center>
        </section>

        <center>
            <div class="div1"></div>
        </center>
    </main>

</body>

</html>
